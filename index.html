<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口出し英語ドッキングトレーナー</title>
  <!-- Google Fonts -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Mockup Smart Phone Container -->
  <div class="app-container" id="app-container">
    <div class="device-notch"></div>
    
    <header>
      <div class="brand">
        <div class="brand-icon">
          <i data-lucide="layers"></i>
        </div>
        <h1>口出しドッキング</h1>
      </div>
      <div class="subtitle">A（方向性）× B（具体的行動）の瞬間発話</div>
    </header>

    <!-- Combined Sentence Results (Sticky at top of content area) -->
    <div class="result-sticky-area">
      <div class="result-card" id="result-card">
        <div class="result-placeholder" id="result-placeholder">
          <i data-lucide="info" style="width: 20px; height: 20px; color: var(--theme-color);"></i>
          <span>パーツAとパーツBをタップしてドッキングしてください。</span>
        </div>
        <div class="result-content" id="result-content" style="display: none;">
          <div class="result-text-container">
            <div class="result-text" id="result-text">I wanna meet the deadline.</div>
            <div class="result-kana" id="result-kana">アイナ ミーダデッ(ド)ライン</div>
          </div>
          <div class="result-translation" id="result-translation">
            [締め切りを守る] ＋ [〜したい]
          </div>
          
          <div class="speed-control">
            <span class="speed-label"><i data-lucide="gauge"></i> 速度: <span id="speed-val">1.0</span>x</span>
            <input type="range" id="speed-slider" min="0.7" max="1.3" step="0.1" value="1.0">
          </div>

          <div class="action-row">
            <button class="action-btn primary-action" id="speak-btn">
              <i data-lucide="volume-2"></i>お手本を聞く
            </button>
            <button class="action-btn" id="record-btn">
              <i data-lucide="mic"></i>発話練習
            </button>
          </div>

          <!-- Pronunciation Checker Box -->
          <div class="feedback-box" id="feedback-box">
            <div class="feedback-header">
              <span>判定結果:</span>
              <span class="score-badge match" id="feedback-score">Excellent!</span>
            </div>
            <div id="feedback-text"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content (Dual scrollable sections) -->
    <main class="main-content">
      
      <!-- Section A: Parts A -->
      <section class="list-section" id="section-parts-a">
        <div class="section-header">
          <span class="section-title">パーツA（固定して発話）</span>
          <span class="count-badge" id="parts-a-count">0</span>
        </div>
        
        <!-- Type Filter Tabs -->
        <div class="type-tabs" id="type-tabs">
          <button class="type-tab-btn active" data-type="all">すべて</button>
          <button class="type-tab-btn" data-type="Type 1">Type 1</button>
          <button class="type-tab-btn" data-type="Type 2">Type 2</button>
          <button class="type-tab-btn" data-type="Type 3">Type 3</button>
          <button class="type-tab-btn" data-type="Type 4">Type 4</button>
          <button class="type-tab-btn" data-type="Type 5">Type 5</button>
        </div>

        <!-- Scrollable list of Parts A -->
        <div class="scroll-container" id="parts-a-list">
          <div class="loading-placeholder">データを読み込んでいます...</div>
        </div>
      </section>

      <!-- Section B: Parts B -->
      <section class="list-section" id="section-parts-b">
        <div class="section-header">
          <span class="section-title">パーツB（スクロールして組み合わせる）</span>
          <span class="count-badge" id="parts-b-count">0</span>
        </div>

        <!-- Search and Category Filters -->
        <div class="filter-controls">
          <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="parts-b-search" placeholder="英単語・日本語でBを検索...">
          </div>
          
          <!-- Category scrollable filter row -->
          <div class="category-strip" id="category-strip">
            <button class="cat-btn active" data-category="all">すべて</button>
            <!-- Dynamically populated categories -->
          </div>
        </div>

        <!-- Scrollable list of Parts B -->
        <div class="scroll-container" id="parts-b-list">
          <div class="select-a-prompt-placeholder">先にパーツAを選択してください。</div>
        </div>
      </section>

    </main>

    <footer class="app-footer">
      <div>英語はパーツのドッキング。口に出して覚えよう。</div>
    </footer>
  </div>

  <!-- Load main app ES module -->
  <script type="module" src="app.js?v=6"></script>
</body>
</html>
